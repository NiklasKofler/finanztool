<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Cash">
  <defs>
    <linearGradient id="cash-gold" x1="24" x2="104" y1="16" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff4a8"/>
      <stop offset="0.34" stop-color="#d99519"/>
      <stop offset="0.7" stop-color="#7a3a05"/>
      <stop offset="1" stop-color="#f3c94f"/>
    </linearGradient>
    <linearGradient id="cash-edge" x1="22" x2="106" y1="26" y2="102" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5b2600"/>
      <stop offset="0.5" stop-color="#fff0a8"/>
      <stop offset="1" stop-color="#7a3300"/>
    </linearGradient>
    <filter id="cash-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#4a2600" flood-opacity="0.42"/>
    </filter>
  </defs>
  <g filter="url(#cash-shadow)">
    <text
      x="64"
      y="94"
      fill="url(#cash-gold)"
      stroke="url(#cash-edge)"
      stroke-width="3"
      text-anchor="middle"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="112"
      font-weight="700"
    >€</text>
  </g>
</svg>
